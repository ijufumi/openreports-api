name: Create PlantUML images

on:
  push:
    paths:
      - docs/db/diagram.puml
    branches:
      - main
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends plantuml graphviz
      - name: Create image
        run: |
          plantuml -tsvg -p < ./docs/db/diagram.puml > ./docs/db/diagram.svg
      - name: Commit image
        uses: EndBug/add-and-commit@v9
        with:
          author_name: Takafumi Iju
          author_email: ijufumi@gmail.com
          message: 'Create image file by GitHub Action(create-plantuml-images.yml).'
          add: './docs/db/diagram.svg'
          push: true
